<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 11: Blackjack (Capstone)</title>
<style>
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1b2a; color: #eee; font-family: 'Courier New', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem; overflow-x: hidden; }
  .header { text-align: center; margin-bottom: 1rem; }
  .header h1 { font-size: clamp(1.4rem, 5vw, 2.4rem); color: #e94560; }
  .header .cap { display: inline-block; background: #e94560; color: #fff; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px; vertical-align: middle; margin-left: 0.5rem; letter-spacing: 0.05em; }
  .header p { color: #888; font-size: 0.9rem; margin-top: 0.3rem; }

  .table { background: linear-gradient(180deg, #0a3d2e 0%, #0d4a35 50%, #0a3d2e 100%); border: 3px solid #1a6b4a; border-radius: 20px; width: 100%; max-width: 560px; padding: 1.5rem; margin-bottom: 1rem; position: relative; box-shadow: inset 0 0 40px rgba(0,0,0,0.4), 0 8px 30px rgba(0,0,0,0.5); }

  .hand-area { margin-bottom: 1.5rem; }
  .hand-area:last-child { margin-bottom: 0; }
  .hand-label { font-size: 0.8rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.6rem; display: flex; justify-content: space-between; align-items: center; }
  .total { background: rgba(0,0,0,0.4); padding: 0.15rem 0.6rem; border-radius: 6px; font-size: 0.9rem; color: #53d769; font-weight: bold; opacity: 0; transition: opacity 0.4s; }
  .total.visible { opacity: 1; }
  .total.gold { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.6); }

  .cards { display: flex; gap: 0.6rem; min-height: 120px; align-items: center; flex-wrap: wrap; }

  .card { width: 80px; height: 115px; border-radius: 8px; background: #fff; position: relative; opacity: 0; transform: translateX(60px) rotateY(90deg); transition: all 0.5s ease-out; box-shadow: 2px 2px 8px rgba(0,0,0,0.4); perspective: 600px; flex-shrink: 0; }
  .card.dealt { opacity: 1; transform: translateX(0) rotateY(0deg); }
  .card-inner { width: 100%; height: 100%; position: relative; }
  .card .val-top { position: absolute; top: 5px; left: 7px; font-size: 0.85rem; font-weight: bold; line-height: 1; }
  .card .suit-top { position: absolute; top: 18px; left: 7px; font-size: 0.75rem; line-height: 1; }
  .card .suit-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; }
  .card .val-bot { position: absolute; bottom: 5px; right: 7px; font-size: 0.85rem; font-weight: bold; transform: rotate(180deg); line-height: 1; }
  .card .suit-bot { position: absolute; bottom: 18px; right: 7px; font-size: 0.75rem; transform: rotate(180deg); line-height: 1; }
  .card.red { color: #d32f2f; }
  .card.black { color: #222; }

  .card.facedown { background: linear-gradient(135deg, #1a3a6e, #0f2847); border: 2px solid #2a5298; }
  .card.facedown .card-inner { display: none; }
  .card.facedown::after { content: '?'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 2rem; color: rgba(255,255,255,0.3); }
  .card.revealing { animation: cardReveal 0.6s ease-out forwards; }
  @keyframes cardReveal {
    0% { transform: rotateY(0deg); }
    50% { transform: rotateY(90deg); }
    51% { background: #fff; border: none; }
    100% { transform: rotateY(0deg); }
  }

  .prompt { text-align: center; font-size: clamp(1rem, 3vw, 1.3rem); color: #ffd700; margin: 1rem 0; opacity: 0; transition: opacity 0.3s; }
  .prompt.visible { opacity: 1; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

  .outcome { text-align: center; opacity: 0; transition: opacity 0.5s; margin-bottom: 0.5rem; }
  .outcome.visible { opacity: 1; }
  .comparison { font-size: 1.1rem; color: #aaa; margin-bottom: 0.5rem; }
  .win-text { font-size: clamp(2rem, 7vw, 3rem); font-weight: bold; color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.6), 0 0 50px rgba(255,215,0,0.3); animation: winPulse 0.8s ease-in-out infinite; }
  @keyframes winPulse { 0%, 100% { transform: scale(1); text-shadow: 0 0 20px rgba(255,215,0,0.6); } 50% { transform: scale(1.06); text-shadow: 0 0 35px rgba(255,215,0,0.9), 0 0 70px rgba(255,215,0,0.4); } }

  .confetti-piece { position: fixed; top: -12px; border-radius: 2px; opacity: 0; pointer-events: none; }
  @keyframes confettiFall { 0% { opacity: 1; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(100vh) rotate(1080deg); } }

  .footer { margin-top: auto; color: #888; font-size: 0.85rem; text-align: center; padding-top: 1.5rem; }
</style>
</head>
<body>
  <div class="header">
    <h1>Day 11: Blackjack <span class="cap">CAPSTONE</span></h1>
    <p>100 Days of Agentic Engineering</p>
  </div>

  <div class="table">
    <!-- Dealer Hand -->
    <div class="hand-area">
      <div class="hand-label">Dealer's Hand <span class="total" id="dealerTotal"></span></div>
      <div class="cards" id="dealerCards"></div>
    </div>
    <!-- Prompt -->
    <div class="prompt" id="prompt">Hit or Stand?</div>
    <!-- Player Hand -->
    <div class="hand-area">
      <div class="hand-label">Your Hand <span class="total" id="playerTotal"></span></div>
      <div class="cards" id="playerCards"></div>
    </div>
  </div>

  <div class="outcome" id="outcome">
    <div class="comparison" id="comparison"></div>
    <div class="win-text" id="winText"></div>
  </div>

  <div class="footer">Ready to build this? Go back to Claude Code and let's start!</div>

<script>
  function makeCard(value, suit, facedown) {
    const red = suit === '\u2665' || suit === '\u2666';
    const card = document.createElement('div');
    card.className = 'card' + (facedown ? ' facedown' : (red ? ' red' : ' black'));
    if (!facedown) {
      card.innerHTML =
        '<div class="card-inner">' +
        '<div class="val-top">' + value + '</div>' +
        '<div class="suit-top">' + suit + '</div>' +
        '<div class="suit-center">' + suit + '</div>' +
        '<div class="val-bot">' + value + '</div>' +
        '<div class="suit-bot">' + suit + '</div>' +
        '</div>';
    }
    card.dataset.value = value;
    card.dataset.suit = suit;
    return card;
  }

  function dealCard(container, value, suit, facedown, delay) {
    return new Promise(resolve => {
      setTimeout(() => {
        const card = makeCard(value, suit, facedown);
        container.appendChild(card);
        requestAnimationFrame(() => {
          requestAnimationFrame(() => card.classList.add('dealt'));
        });
        setTimeout(resolve, 500);
      }, delay);
    });
  }

  function revealCard(card, value, suit) {
    return new Promise(resolve => {
      const red = suit === '\u2665' || suit === '\u2666';
      card.classList.add('revealing');
      setTimeout(() => {
        card.classList.remove('facedown', 'revealing');
        card.classList.add(red ? 'red' : 'black');
        card.innerHTML =
          '<div class="card-inner">' +
          '<div class="val-top">' + value + '</div>' +
          '<div class="suit-top">' + suit + '</div>' +
          '<div class="suit-center">' + suit + '</div>' +
          '<div class="val-bot">' + value + '</div>' +
          '<div class="suit-bot">' + suit + '</div>' +
          '</div>';
        card.style.background = '#fff';
        card.style.border = 'none';
        resolve();
      }, 300);
    });
  }

  function showTotal(el, val, gold) {
    el.textContent = val;
    el.classList.add('visible');
    if (gold) el.classList.add('gold');
  }

  function spawnConfetti() {
    const colors = ['#e94560','#53d769','#ffd700','#00b4d8','#ff6b6b','#a855f7'];
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.width = (6 + Math.random() * 6) + 'px';
      p.style.height = (4 + Math.random() * 10) + 'px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animation = 'confettiFall ' + (1.5 + Math.random() * 2) + 's linear forwards';
      p.style.animationDelay = Math.random() * 0.6 + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 4500);
    }
  }

  const playerArea = document.getElementById('playerCards');
  const dealerArea = document.getElementById('dealerCards');
  const playerTotal = document.getElementById('playerTotal');
  const dealerTotal = document.getElementById('dealerTotal');
  const prompt = document.getElementById('prompt');
  const outcome = document.getElementById('outcome');
  const comparison = document.getElementById('comparison');
  const winText = document.getElementById('winText');

  async function runGame() {
    // Reset
    playerArea.innerHTML = ''; dealerArea.innerHTML = '';
    playerTotal.textContent = ''; playerTotal.classList.remove('visible','gold');
    dealerTotal.textContent = ''; dealerTotal.classList.remove('visible','gold');
    prompt.classList.remove('visible');
    outcome.classList.remove('visible');
    comparison.textContent = ''; winText.textContent = '';

    // Deal initial cards
    await dealCard(playerArea, '10', '\u2660', false, 400);
    await dealCard(dealerArea, 'K', '\u2666', false, 600);
    await dealCard(playerArea, '7', '\u2665', false, 600);
    showTotal(playerTotal, '17');
    await dealCard(dealerArea, '?', '', true, 600);
    showTotal(dealerTotal, '10');

    // Show prompt
    await new Promise(r => setTimeout(r, 800));
    prompt.classList.add('visible');

    // Player hits
    await new Promise(r => setTimeout(r, 2000));
    prompt.classList.remove('visible');
    await dealCard(playerArea, '4', '\u2663', false, 300);
    await new Promise(r => setTimeout(r, 300));
    showTotal(playerTotal, '21!', true);

    // Dealer reveals
    await new Promise(r => setTimeout(r, 1200));
    const hiddenCard = dealerArea.children[1];
    await revealCard(hiddenCard, '9', '\u2660');
    await new Promise(r => setTimeout(r, 400));
    showTotal(dealerTotal, '19');

    // Outcome
    await new Promise(r => setTimeout(r, 1000));
    comparison.textContent = '21 vs 19';
    outcome.classList.add('visible');
    await new Promise(r => setTimeout(r, 600));
    winText.textContent = 'YOU WIN!';
    spawnConfetti();

    // Wait then restart
    await new Promise(r => setTimeout(r, 5000));
    runGame();
  }

  runGame();
</script>
</body>
</html>
