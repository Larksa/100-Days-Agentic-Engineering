<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 9: Secret Auction</title>
<style>
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: 'Courier New', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: clamp(1.5rem, 5vw, 2.5rem); color: #e94560; }
  .header p { color: #888; font-size: 0.9rem; margin-top: 0.3rem; }
  .stage { position: relative; width: 100%; max-width: 600px; min-height: 320px; display: flex; justify-content: center; align-items: center; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .card-container { perspective: 800px; width: 140px; height: 190px; opacity: 0; transition: opacity 0.4s, transform 0.8s; }
  .card-container.visible { opacity: 1; }
  .card-container.winner { transform: scale(1.15) translateY(-20px); z-index: 10; }
  .card-container.loser { opacity: 0.5; transform: scale(0.9); }
  .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.8s; border-radius: 12px; }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; backface-visibility: hidden; border: 2px solid #0f3460; }
  .card-back { background: linear-gradient(135deg, #0f3460, #16213e); }
  .card-back .mystery { font-size: 3rem; color: #e94560; }
  .card-back .bidder { font-size: 0.85rem; color: #888; margin-top: 0.5rem; }
  .card-front { background: #16213e; transform: rotateY(180deg); }
  .card-front .bid { font-size: 2rem; color: #53d769; font-weight: bold; }
  .card-front .bidder { font-size: 0.85rem; color: #aaa; margin-top: 0.5rem; }
  .result { text-align: center; opacity: 0; transition: opacity 0.6s; }
  .result.visible { opacity: 1; }
  .trophy { font-size: 3rem; animation: pulseGlow 1.2s ease-in-out infinite; }
  @keyframes pulseGlow { 0%, 100% { text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700; transform: scale(1); } 50% { text-shadow: 0 0 25px #ffd700, 0 0 50px #ffd700, 0 0 80px #ffd700; transform: scale(1.1); } }
  .winner-text { font-size: clamp(1.5rem, 4vw, 2.2rem); color: #ffd700; font-weight: bold; margin-top: 0.5rem; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
  .confetti { position: fixed; top: -10px; width: 8px; height: 8px; border-radius: 50%; opacity: 0; }
  @keyframes fall { 0% { opacity: 1; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(100vh) rotate(720deg); } }
  .footer { margin-top: auto; color: #888; font-size: 0.85rem; text-align: center; padding-top: 2rem; }
</style>
</head>
<body>
  <div class="header">
    <h1>Day 9: Secret Auction</h1>
    <p>100 Days of Agentic Engineering</p>
  </div>
  <div class="stage" id="stage">
    <div class="card-container" id="c0">
      <div class="card" id="card0">
        <div class="card-face card-back"><div class="mystery">?</div><div class="bidder">Bidder 1</div></div>
        <div class="card-face card-front"><div class="bid">$150</div><div class="bidder">Bidder 1</div></div>
      </div>
    </div>
    <div class="card-container" id="c1">
      <div class="card" id="card1">
        <div class="card-face card-back"><div class="mystery">?</div><div class="bidder">Bidder 2</div></div>
        <div class="card-face card-front"><div class="bid">$220</div><div class="bidder">Bidder 2</div></div>
      </div>
    </div>
    <div class="card-container" id="c2">
      <div class="card" id="card2">
        <div class="card-face card-back"><div class="mystery">?</div><div class="bidder">Bidder 3</div></div>
        <div class="card-face card-front"><div class="bid">$180</div><div class="bidder">Bidder 3</div></div>
      </div>
    </div>
  </div>
  <div class="result" id="result">
    <div class="trophy">&#127942;</div>
    <div class="winner-text">Winner! Bidder 2 &mdash; $220</div>
  </div>
  <div class="footer">Ready to build this? Go back to Claude Code and let's start!</div>
<script>
  function spawnConfetti() {
    const colors = ['#e94560','#53d769','#ffd700','#00b4d8','#ff6b6b'];
    for (let i = 0; i < 30; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.width = (5 + Math.random() * 8) + 'px';
      c.style.height = c.style.width;
      c.style.animation = 'fall ' + (1.5 + Math.random() * 2) + 's linear forwards';
      c.style.animationDelay = Math.random() * 0.5 + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }
  function run() {
    const containers = [document.getElementById('c0'), document.getElementById('c1'), document.getElementById('c2')];
    const cards = [document.getElementById('card0'), document.getElementById('card1'), document.getElementById('card2')];
    const result = document.getElementById('result');
    // Reset
    containers.forEach(c => { c.classList.remove('visible','winner','loser'); });
    cards.forEach(c => c.classList.remove('flipped'));
    result.classList.remove('visible');
    // Step 1: Appear one by one
    setTimeout(() => containers[0].classList.add('visible'), 300);
    setTimeout(() => containers[1].classList.add('visible'), 800);
    setTimeout(() => containers[2].classList.add('visible'), 1300);
    // Step 2: Flip one by one
    setTimeout(() => cards[0].classList.add('flipped'), 2200);
    setTimeout(() => cards[1].classList.add('flipped'), 2900);
    setTimeout(() => cards[2].classList.add('flipped'), 3600);
    // Step 3: Highlight winner (index 1 = $220), dim losers
    setTimeout(() => {
      containers[1].classList.add('winner');
      containers[0].classList.add('loser');
      containers[2].classList.add('loser');
    }, 4800);
    // Step 4: Show result
    setTimeout(() => {
      result.classList.add('visible');
      spawnConfetti();
    }, 5600);
    // Loop
    setTimeout(run, 9500);
  }
  run();
</script>
</body>
</html>
